<!DOCTYPE html>
<html>
<head>
    <title> 2048 </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class = "title">2048</h1>
        <div class = "auth">
            <input id = "username" placeholder = "username">
            <input id = "password" type = "password" placeholder = "password">
            <button onclick = "loginFromForm()">Login</button>
        </div>

        <div class="board">
            <div class="box" id = "tile-0-0"></div>
            <div class="box" id = "tile-0-1"></div>
            <div class="box" id = "tile-0-2"></div>
            <div class="box" id = "tile-0-3"></div>

            <div class="box" id = "tile-1-0"></div>
            <div class="box" id = "tile-1-1"></div>
            <div class="box" id = "tile-1-2"></div>
            <div class="box" id = "tile-1-3"></div>

            <div class="box" id = "tile-2-0"></div>
            <div class="box" id = "tile-2-1"></div>
            <div class="box" id = "tile-2-2"></div>
            <div class="box" id = "tile-2-3"></div>

            <div class="box" id = "tile-3-0"></div>
            <div class="box" id = "tile-3-1"></div>
            <div class="box" id = "tile-3-2"></div>
            <div class="box" id = "tile-3-3"></div>
        </div>

        <div class = "controls">
            <button onclick = "saveCurrentGame()">Save Game</button>
            <button onclick = "loadGame(currentUser)">Load Game</button>
            <button onclick = "loadLeaderboard()">Show Leaderboard</button>
        </div>

        <h3>Leaderboard</h3>
        <ul id="leaderboard"></ul>

    <script src="game.js"></script>
</body>
</html>
