<!DOCTYPE html>
<html>
<head>
    <title> 2048 </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class = "title">2048</h1>
        <div class = "game-container">

            <div class="board">
                <div class="box" id = "tile-0-0"></div>
                <div class="box" id = "tile-0-1"></div>
                <div class="box" id = "tile-0-2"></div>
                <div class="box" id = "tile-0-3"></div>

                <div class="box" id = "tile-1-0"></div>
                <div class="box" id = "tile-1-1"></div>
                <div class="box" id = "tile-1-2"></div>
                <div class="box" id = "tile-1-3"></div>

                <div class="box" id = "tile-2-0"></div>
                <div class="box" id = "tile-2-1"></div>
                <div class="box" id = "tile-2-2"></div>
                <div class="box" id = "tile-2-3"></div>

                <div class="box" id = "tile-3-0"></div>
                <div class="box" id = "tile-3-1"></div>
                <div class="box" id = "tile-3-2"></div>
                <div class="box" id = "tile-3-3"></div>
            </div>

            <div class = "controls">
                <button onclick = "saveCurrentGame()">Save Game</button>
                <button onclick = "loadGame(currentUser)">Load Game</button>
                <button onclick = "toggleLeaderboard()">Show Leaderboard</button>
            </div>

            <div id="leaderboardPanel">
                <h2>Leaderboard</h2>
                <ul id="leaderboard"></ul>
                <button onclick="hideLeaderboard()">Hide Leaderboard</button>
            </div>

        </div>

        <div id="loginModal" class="modal">
            <div class = "modal-content">
                <h2>Welcome to 2048</h2>
                <input id="username" placeholder="Username">
                <input id = "password" type="password" placeholder="Password">

                <button onclick="loginFromForm()">Login</button>
                <button onclick="registerFromForm()">Create Account</button>
                <button onclick="continueAsGuest()">Continue as guest</button>

            </div>

        </div>

        <div id="gameOverModal" class="modal">
            <div class = "modal-content">
                <h2>Game Over</h2>
                <p id="finalScore"></p>

                <button onclick="playAgain()">Play Again</button>
                <button onclick="returnToMenu()">Main Menu</button>
            </div>
        </div>

        <div class = "score-box">
            Score: <span  id="score">0</span>
        </div>

    <script src="game.js"></script>
</body>
</html>
